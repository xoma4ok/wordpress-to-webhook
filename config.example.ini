[source]
# GET endpoint to poll for new posts
source_url = https://example.com/wp-json/wp/v2/posts?categories=10&per_page=5
# Polling interval in seconds
interval_seconds = 90

[filters]
# Comma-separated regular expressions (case-insensitive).
# A post is forwarded if at least one pattern matches the content text.
# Applied before transliteration. Use .* to forward all posts.
patterns = alert,warning,danger

[webhook]
# POST endpoint URL
webhook_url = http://10.0.0.1:9000/webhook
# Bearer token for Authorization header. Leave empty to disable auth.
token = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
# Value of the "channel" field in the request body
channel = #alerts
# Maximum message part size in bytes (UTF-8).
# Cyrillic = 2 bytes/char, Latin = 1 byte/char.
# Messages exceeding this limit are split on word boundaries.
max_length = 130
# Delay in seconds between sending consecutive parts of a split message
part_delay_seconds = 3
# Transliterate Cyrillic to Latin before sending (true/false)
transliterate = false

[state]
# File path to persist the last processed post ID across restarts
state_file = state.txt

[replacements]
# Optional substring replacements applied after filter matching, before transliteration.
# Value is a JSON object: {"find": "replace", ...}
# Matching is case-sensitive and applies to any substring, not just whole words.
# Replacements are applied in the order they appear in the JSON object.
#
# Abbreviate a single word:
# pairs = {"липецк": "лпк"}
#
# Expand abbreviation:
# pairs = {"бпла": "беспилотник"}
#
# Normalize multi-word phrase (contains spaces):
# pairs = {"беспилотный летательный аппарат": "бпла"}
#
# Remove unwanted substring:
# pairs = {"[подробнее]": ""}
#
# Combined example with multiple replacements, including one with spaces:
pairs = {"бпла": "UAV", "беспилотный летательный аппарат": "UAV", "липецк": "лпк", "[подробнее]": ""}